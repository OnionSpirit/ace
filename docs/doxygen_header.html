<!-- doxygen-awesome plugins -->

<script type="text/javascript" src="$relpath^doxygen-awesome-fragment-copy-button.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-paragraph-link.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-interactive-toc.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-tabs.js"></script>
<script type="text/javascript">
  DoxygenAwesomeFragmentCopyButton.init()
  DoxygenAwesomeParagraphLink.init()
  DoxygenAwesomeInteractiveToc.init()
  DoxygenAwesomeTabs.init()
  // patched: Doxygen 1.16.1 has no #MSearchBox, append toggle to titlearea
  $(function() {
    $(document).ready(function() {
      const toggle = document.createElement('doxygen-awesome-dark-mode-toggle');
      toggle.title = "Toggle Light/Dark Mode";
      toggle.updateIcon();
      const searchBox = document.getElementById("MSearchBox");
      if (searchBox) {
        searchBox.parentNode.appendChild(toggle);
      } else {
        const titlearea = document.getElementById("titlearea");
        if (titlearea) titlearea.appendChild(toggle);
      }
      // re-append on resize
      $(window).resize(function() {
        const box = document.getElementById("MSearchBox");
        if (box) box.parentNode.appendChild(toggle);
        else {
          const ta = document.getElementById("titlearea");
          if (ta && toggle.parentNode !== ta) ta.appendChild(toggle);
        }
      });
    });
  });
</script>
<!-- Mermaid — renders @mermaid diagrams -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: true,
    theme: 'base',
    themeVariables: {
      primaryColor: '#89b4fa',
      primaryTextColor: '#cdd6f4',
      primaryBorderColor: '#5576ba',
      lineColor: '#b4befe',
      secondaryColor: '#313244',
      tertiaryColor: '#1e1e2e'
    }
  });
</script>
